name: Docker-Image bauen & nach GHCR pushen

# Baut das All-in-one-Image (App + qmd + nginx) und veröffentlicht es in der
# GitHub Container Registry: ghcr.io/robirr/secondbrain
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:   # auch manuell auslösbar

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write     # nötig, um nach GHCR zu pushen
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: An GHCR anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tags/Labels ableiten
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Bauen & pushen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
