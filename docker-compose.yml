# Second Brain — ALLES IN EINEM CONTAINER (App + qmd-Suche)
# Start:  docker compose up -d --build
# Web-UI: http://<UNRAID-IP>:8686
#
# Nur EINE Pflichtangabe: der Pfad zu deinen Notizen (SECOND_BRAIN_DATA) in .env.
# qmd (Bedeutungssuche) läuft mit im Container — kein zweiter Dienst nötig.
services:
  second-brain:
    build: .
    image: second-brain:latest
    container_name: second-brain
    ports:
      - "8686:80"          # Host-Port 8686 (frei wählbar) -> Container-Port 80
    environment:
      - TZ=Europe/Zurich
    volumes:
      # (1) Deine Notizen (Vault-WURZEL: graph.json + .md). Read-only — wird nur gelesen.
      - ${SECOND_BRAIN_DATA:-./data}:/usr/share/nginx/html/data:ro
      # (2) qmd-Zuhause: lokale Modelle + Suchindex. Bleibt über Neustarts erhalten,
      #     damit die ~2-3 GB Modelle nicht jedes Mal neu geladen werden.
      - qmd-home:/qmd-home
    restart: unless-stopped
    labels:
      # Unraid: WebUI-Link + Icon in der Docker-Übersicht
      - "net.unraid.docker.webui=http://[IP]:[PORT:8686]/"
      - "net.unraid.docker.icon=https://raw.githubusercontent.com/robirr/secondbrain/main/public/favicon.svg"

volumes:
  qmd-home:
