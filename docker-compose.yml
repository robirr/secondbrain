# Second Brain — Ansicht · Docker Compose (für Unraid)
# Start:  docker compose up -d --build
# Web-UI: http://<UNRAID-IP>:8686
#
# Produktive Daten: Pfad in .env setzen (SECOND_BRAIN_DATA) — siehe .env.example.
services:
  second-brain-app:
    build: .
    image: second-brain-app:latest
    container_name: second-brain-app
    ports:
      - "8686:80"          # Host-Port 8686 (frei wählbar) -> Container-Port 80
    environment:
      - TZ=Europe/Zurich
      # qmd-HTTP-Dienst (Bedeutungssuche). Läuft auf dem NAS: `qmd mcp --http --daemon` (Port 8181).
      # host.docker.internal zeigt via extra_hosts auf den NAS-Host. Alternativ NAS-IP eintragen.
      - QMD_URL=${QMD_URL:-http://host.docker.internal:8181}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Produktive Daten vom NAS (read-only). Die App lädt sie zur Laufzeit unter /data
      # (erwartet z.B. graph.json). Ist der Pfad nicht gesetzt, wird ./data verwendet.
      - ${SECOND_BRAIN_DATA:-./data}:/usr/share/nginx/html/data:ro
    restart: unless-stopped
    labels:
      # Unraid: WebUI-Link + Icon in der Docker-Übersicht
      - "net.unraid.docker.webui=http://[IP]:[PORT:8686]/"
      - "net.unraid.docker.icon=https://raw.githubusercontent.com/robirr/secondbrain/main/public/favicon.svg"
